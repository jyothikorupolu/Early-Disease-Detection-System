<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f6f9;
            padding: 40px;
        }

        .container{
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        th{
            background: #007bff;
            color: white;
            padding: 14px;
            text-align: center;
        }

        td{
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even){
            background: #f8f9fa;
        }

        tr:hover{
            background: #e9f2ff;
        }

        .back-btn{
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .back-btn:hover{
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Prediction History</h1>

        <table>
            <tr>
                <th>ID</th>
                <th>Country</th>
                <th>Occupation</th>
                <th>Risk Percentage</th>
                <th>Prediction</th>
                <th>Date</th>
            </tr>

            {% for row in predictions %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}%</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="/" class="back-btn">← Make a Prediction</a>
        <br><br>
        <a href="/dashboard" class="back-btn">📊 View Dashboard</a>
        <br><br>
        <a href="/logout" class="back-btn">🚪 Logout</a>

    </div>

</body>
</html>
