```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Early Disease Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:60px;
            text-align:center;
        }

        .title{
            text-align:center;
            font-weight:bold;
            color:#0d6efd;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border-radius:30px;
            font-size:18px;
            font-weight:bold;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        🩺
    </div>

    <h2 class="title">
        Welcome Back
    </h2>

    <p class="subtitle">
        Login to access the Early Disease Detection System
    </p>

    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-primary btn-login">

            Login

        </button>

    </form>

    <div class="register-link">

        Don't have an account?

        <a href="/register">
            Register Here
        </a>

    </div>

</div>

</body>
</html>
```
