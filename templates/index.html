<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Disease Detection System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#e3f2fd,#ffffff);
            min-height:100vh;
        }

        .main-card{
            max-width:900px;
            margin:40px auto;
            border:none;
            border-radius:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.15);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
            border-radius:20px 20px 0 0 !important;
        }

        .card-header h2{
            font-weight:bold;
        }

        .form-label{
            font-weight:600;
        }

        .btn-predict{
            width:100%;
            font-size:18px;
            padding:12px;
            font-weight:bold;
        }

        .bottom-links{
            text-align:center;
            margin-top:25px;
        }

        .bottom-links a{
            text-decoration:none;
            font-weight:600;
            margin:0 15px;
        }

        .bottom-links a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card main-card">

        <div class="card-header">
            <h2>🩺 Early Disease Detection System</h2>
            <p class="mb-0">
                Predict Disease Risk Using Machine Learning
            </p>
        </div>

        <div class="card-body p-4">

            <form action="/predict" method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Country</label>
                        <select name="country" class="form-select">
                            <option>India</option>
                            <option>Indonesia</option>
                            <option>Malaysia</option>
                            <option>Singapore</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Occupation</label>
                        <select name="occupation" class="form-select">
                            <option>Engineer</option>
                            <option>Doctor</option>
                            <option>Teacher</option>
                            <option>Lawyer</option>
                            <option>Nurse</option>
                            <option>Architect</option>
                            <option>Accountant</option>
                            <option>Chef</option>
                            <option>Others</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="1">Male</option>
                            <option value="2">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" name="height" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" name="weight" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Systolic BP</label>
                        <input type="number" name="ap_hi" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Diastolic BP</label>
                        <input type="number" name="ap_lo" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cholesterol</label>
                        <input type="number" name="cholesterol" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Glucose</label>
                        <input type="number" name="gluc" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Smoker</label>
                        <select name="smoke" class="form-select">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Alcohol Consumption</label>
                        <select name="alco" class="form-select">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-4">
                        <label class="form-label">Physically Active</label>
                        <select name="active" class="form-select">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary btn-predict">
                    Predict Disease Risk
                </button>

            </form>

            <div class="bottom-links">

                <a href="/dashboard">
                    📈 Dashboard
                </a>

                |

                <a href="/history">
                    📊 Prediction History
                </a>
                <br>
                <br>
                <a href="/logout" class="btn btn-danger">
    Logout
</a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
